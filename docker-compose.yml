version: "3.8"

services:
  app:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - instance:/app/instance
      - ./models:/app/models:ro
      - ./data:/app/data:ro
      - ./reports:/app/reports:ro
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

volumes:
  instance:
